<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SparkAI 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;overflow:hidden}
.container{text-align:center;padding:2rem;max-width:600px}
.logo{font-size:3.5rem;font-weight:800;margin-bottom:.5rem;background:linear-gradient(90deg,#76b852,#8DC26F);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:1.1rem;color:#aaa;margin-bottom:2rem;letter-spacing:.3em;text-transform:uppercase}
.coming-soon{font-size:2rem;font-weight:300;margin-bottom:1.5rem;color:#e0e0e0}
.description{font-size:1rem;color:#888;line-height:1.7;margin-bottom:2.5rem}
.pulse{display:inline-block;width:12px;height:12px;background:#76b852;border-radius:50%;animation:pulse 2s ease-in-out infinite;margin-right:8px;vertical-align:middle}
.status{font-size:.9rem;color:#76b852}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
.glow{position:fixed;width:300px;height:300px;border-radius:50%;background:rgba(118,184,82,.08);filter:blur(80px);top:20%;left:60%;pointer-events:none}
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
<div class="logo">SparkAI</div>
<div class="tagline">2026</div>
<div class="coming-soon">Coming Soon</div>
<p class="description">Something powerful is being built.<br>Stay tuned for what's next.</p>
<div><span class="pulse"></span><span class="status">In Development</span></div>
</div>
</body>
</html>
